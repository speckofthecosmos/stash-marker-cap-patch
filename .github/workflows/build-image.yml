name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'marker-cap.patch'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      stash_ref:
        description: 'stashapp/stash ref to build from'
        default: 'develop'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90

    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Resolve STASH_REF
        id: ref
        env:
          INPUT_REF: ${{ github.event.inputs.stash_ref }}
        run: |
          REF="${INPUT_REF:-develop}"
          # Whitelist: letters, digits, dash, dot, slash, underscore
          if ! printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Rejecting unsafe ref: $REF"
            exit 1
          fi
          echo "stash_ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Clone stashapp/stash
        env:
          STASH_REF: ${{ steps.ref.outputs.stash_ref }}
        run: |
          git clone --depth 1 --branch "$STASH_REF" \
            https://github.com/stashapp/stash.git .stash

      - name: Apply patch (dry-run + apply)
        working-directory: .stash
        run: |
          git apply --check ../marker-cap.patch
          git apply ../marker-cap.patch

      - name: Copy Dockerfile into build context
        run: cp Dockerfile .stash/Dockerfile.markercap

      - name: Record upstream hash
        id: upstream_hash
        working-directory: .stash
        run: echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          STASH_REF: ${{ steps.ref.outputs.stash_ref }}
          UPSTREAM_HASH: ${{ steps.upstream_hash.outputs.hash }}
        run: |
          IMG="${REGISTRY}/${IMAGE_NAME}"
          # ghcr requires lowercase image path
          IMG=$(printf '%s' "$IMG" | tr '[:upper:]' '[:lower:]')
          TAGS="${IMG}:${STASH_REF},${IMG}:${STASH_REF}-${UPSTREAM_HASH}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .stash
          file: .stash/Dockerfile.markercap
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            GITHASH=${{ steps.upstream_hash.outputs.hash }}
            STASH_VERSION=${{ steps.ref.outputs.stash_ref }}-marker-cap
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=stashapp/stash + PR #6855 (marker cap) patch
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          IMAGE: ${{ steps.tags.outputs.image }}
          TAGS: ${{ steps.tags.outputs.tags }}
          STASH_REF: ${{ steps.ref.outputs.stash_ref }}
          UPSTREAM_HASH: ${{ steps.upstream_hash.outputs.hash }}
        run: |
          {
            echo "### Built and pushed"
            echo "- Image: \`${IMAGE}\`"
            echo "- Tags: ${TAGS}"
            echo "- Upstream: \`${STASH_REF}\` @ \`${UPSTREAM_HASH}\`"
            echo "- Platforms: linux/amd64, linux/arm64"
          } >> "$GITHUB_STEP_SUMMARY"
