name: Build and push image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'marker-cap.patch'
      - '.github/workflows/build-image.yml'
  schedule:
    # Nightly at 03:17 UTC. Early-exit check below compares upstream
    # develop HEAD to the last-built tag; if unchanged, the build jobs
    # are skipped entirely (~30s for the check, no ghcr push).
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      stash_ref:
        description: 'stashapp/stash ref to build from'
        default: 'develop'
        type: string
      force:
        description: 'Force rebuild even if upstream SHA unchanged'
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  # Lowercased in jobs because ghcr requires lowercase paths
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    name: Check upstream
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip: ${{ steps.resolve.outputs.skip }}
      stash_ref: ${{ steps.resolve.outputs.stash_ref }}
      upstream_sha: ${{ steps.resolve.outputs.upstream_sha }}
      image_lower: ${{ steps.resolve.outputs.image_lower }}
    steps:
      - name: Resolve ref + skip status
        id: resolve
        env:
          INPUT_REF: ${{ github.event.inputs.stash_ref }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          EVENT_NAME: ${{ github.event_name }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          REF="${INPUT_REF:-develop}"
          if ! printf '%s' "$REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Rejecting unsafe ref: $REF"
            exit 1
          fi
          echo "stash_ref=$REF" >> "$GITHUB_OUTPUT"

          IMG=$(printf '%s/%s' "$REGISTRY" "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "image_lower=$IMG" >> "$GITHUB_OUTPUT"

          UPSTREAM_FULL=$(git ls-remote https://github.com/stashapp/stash.git "refs/heads/$REF" | cut -f1)
          UPSTREAM_SHA=$(printf '%s' "$UPSTREAM_FULL" | cut -c1-7)
          if [ -z "$UPSTREAM_SHA" ]; then
            echo "Could not resolve upstream SHA for ref '$REF'; will proceed with build to surface the failure."
            UPSTREAM_SHA="unknown-$(date -u +%Y%m%d%H%M)"
          fi
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "Upstream $REF is at $UPSTREAM_SHA"

          # Skip only on scheduled runs when the hash-tagged image already exists.
          # Push and manual dispatch always rebuild (force flag bypasses too).
          SKIP="false"
          if [ "$EVENT_NAME" = "schedule" ] && [ "$INPUT_FORCE" != "true" ]; then
            TAG="$IMG:$REF-$UPSTREAM_SHA"
            if docker manifest inspect "$TAG" > /dev/null 2>&1; then
              echo "Image $TAG already exists; skipping build."
              SKIP="true"
            else
              echo "Image $TAG does not exist; build will proceed."
            fi
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64
    outputs:
      digest-linux-amd64: ${{ steps.push.outputs.digest }}
      digest-linux-arm64: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4

      - name: Clone stashapp/stash
        env:
          STASH_REF: ${{ needs.check.outputs.stash_ref }}
        run: |
          git clone --depth 1 --branch "$STASH_REF" \
            https://github.com/stashapp/stash.git .stash

      - name: Apply patch (dry-run + apply)
        working-directory: .stash
        run: |
          git apply --check ../marker-cap.patch
          git apply ../marker-cap.patch

      - name: Copy Dockerfile into build context
        run: cp Dockerfile .stash/Dockerfile.markercap

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .stash
          file: .stash/Dockerfile.markercap
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ needs.check.outputs.image_lower }},push-by-digest=true,name-canonical=true
          build-args: |
            GITHASH=${{ needs.check.outputs.upstream_sha }}
            STASH_VERSION=${{ needs.check.outputs.stash_ref }}-marker-cap
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=stashapp/stash + PR #6855 (marker cap) patch
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    needs: [check, build]
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE_LOWER: ${{ needs.check.outputs.image_lower }}
          STASH_REF: ${{ needs.check.outputs.stash_ref }}
          UPSTREAM_SHA: ${{ needs.check.outputs.upstream_sha }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_LOWER}:${STASH_REF}" \
            -t "${IMAGE_LOWER}:${STASH_REF}-${UPSTREAM_SHA}" \
            $(printf "${IMAGE_LOWER}@sha256:%s " *)

      - name: Inspect final manifest
        env:
          IMAGE_LOWER: ${{ needs.check.outputs.image_lower }}
          STASH_REF: ${{ needs.check.outputs.stash_ref }}
        run: docker buildx imagetools inspect "${IMAGE_LOWER}:${STASH_REF}"

      - name: Summary
        env:
          IMAGE_LOWER: ${{ needs.check.outputs.image_lower }}
          STASH_REF: ${{ needs.check.outputs.stash_ref }}
          UPSTREAM_SHA: ${{ needs.check.outputs.upstream_sha }}
        run: |
          {
            echo "### Built and pushed"
            echo "- Image: \`${IMAGE_LOWER}\`"
            echo "- Tags: \`${STASH_REF}\`, \`${STASH_REF}-${UPSTREAM_SHA}\`"
            echo "- Upstream: \`${STASH_REF}\` @ \`${UPSTREAM_SHA}\`"
            echo "- Platforms: linux/amd64 (native), linux/arm64 (native via ubuntu-24.04-arm)"
          } >> "$GITHUB_STEP_SUMMARY"

  noop:
    name: Skip noted
    needs: check
    if: needs.check.outputs.skip == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        env:
          STASH_REF: ${{ needs.check.outputs.stash_ref }}
          UPSTREAM_SHA: ${{ needs.check.outputs.upstream_sha }}
        run: |
          {
            echo "### No rebuild needed"
            echo "Upstream \`${STASH_REF}\` is at \`${UPSTREAM_SHA}\`; image for this SHA already exists."
          } >> "$GITHUB_STEP_SUMMARY"
